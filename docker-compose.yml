services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - C:/Users/mlc/.ollama:/root/.ollama
    restart: unless-stopped
    command: serve

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - C:/Users/mlc/.cache/huggingface/hub:/root/.cache/huggingface/hub
    depends_on:
      - ollama
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    # 取消环境变量，让前端自动检测（使用 app.py 中的 socket 检测）
    # environment:
    #   API_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped